name: 功能建议
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请详细描述你的想法，帮助我们更好地理解需求。

  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能建议是否与某个问题相关？请描述
      placeholder: 当我在使用...时，遇到了...的问题
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你希望实现的功能
      placeholder: 我希望能够...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
      placeholder: 我也考虑过...

  - type: textarea
    id: context
    attributes:
      label: 其他信息
      description: 添加任何其他上下文或截图

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已经搜索过现有的 issues，确认这不是重复建议
          required: true
        - label: 我愿意参与这个功能的讨论和测试
