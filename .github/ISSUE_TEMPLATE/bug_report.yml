name: Bug 报告
description: 报告一个问题或错误
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！请尽可能详细地填写以下信息，帮助我们定位和解决问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述你遇到的问题
      placeholder: 当我...的时候，发生了...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供详细的步骤来复现这个问题
      placeholder: |
        1. 打开 PrismCast
        2. 点击...
        3. 选择...
        4. 出现问题
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 描述你期望发生的行为
      placeholder: 我期望...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的行为
      placeholder: 实际上...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PrismCast 版本
      description: 你使用的版本号
      placeholder: 例如：v1.0.0
    validations:
      required: true

  - type: input
    id: windows_version
    attributes:
      label: Windows 版本
      description: 你的 Windows 版本
      placeholder: 例如：Windows 11 23H2
    validations:
      required: true

  - type: checkboxes
    id: mpv
    attributes:
      label: MPV 安装状态
      options:
        - label: 已安装 MPV
        - label: 未安装 MPV

  - type: textarea
    id: logs
    attributes:
      label: 日志文件
      description: 如有必要，请粘贴 `%TEMP%\PrismCast\prismcast.log` 中的相关日志
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有必要，请添加截图帮助说明问题

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已经搜索过现有的 issues，确认这不是重复报告
          required: true
        - label: 我已经提供了足够的信息来复现这个问题
          required: true
